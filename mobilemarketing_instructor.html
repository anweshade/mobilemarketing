<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Pitch — Instructor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#FFFFFF;color:#1A1A2E;min-height:100vh;}

/* TOPBAR */
.topbar{background:#1A1A2E;height:50px;display:flex;align-items:center;padding:0 1.1rem;gap:.75rem;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;letter-spacing:.04em;}
.topbar-logo em{color:#A78BFA;font-style:normal;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.625rem;}
.inst-tag{background:#A78BFA;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:3px;text-transform:uppercase;}
.conn-pill{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:#aaa;background:#ffffff18;border-radius:20px;padding:3px 10px;}
.cdot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.cdot.live{background:#2DD4BF;}

.wrap{padding:1.1rem;background:#FFFFFF;}

/* WAITING */
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:#1A1A2E;margin-bottom:3px;line-height:1;}
.page-sub{font-size:.875rem;color:#6B6B8A;margin-bottom:1.1rem;}

.url-card{background:#1A1A2E;border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:1rem;}
.url-icon{font-size:2rem;flex-shrink:0;}
.url-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#A78BFA;margin-bottom:4px;}
.url-val{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:#fff;word-break:break-all;line-height:1.3;}
.url-hint{font-size:.75rem;color:#888;margin-top:3px;}

.groups-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.1rem;}
.wait-card{border-radius:12px;padding:.875rem;border:3px solid #E2DFD8;background:#fff;transition:all .2s;}
.wait-card.claimed{border-color:#FDE047;background:#FEF9C3;}
.wait-card.submitted{border-color:#2DD4BF;background:#CCFBF1;}
.wc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.wc-num{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6B6B8A;}
.wc-emoji{font-size:1.4rem;}
.wc-name{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;color:#1A1A2E;margin-bottom:5px;line-height:1.2;}
.wc-pill{display:inline-block;font-size:.7rem;font-weight:700;border-radius:20px;padding:2px 9px;letter-spacing:.04em;}
.wc-pill.w{background:#F0EEE9;color:#6B6B8A;}
.wc-pill.g{background:#FEF9C3;color:#92600A;}
.wc-pill.d{background:#CCFBF1;color:#0F766E;}

.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.btn-primary{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.04em;padding:9px 22px;border:none;border-radius:8px;cursor:pointer;background:#5B21B6;color:#fff;transition:all .15s;}
.btn-primary:hover{background:#4C1D95;transform:translateY(-1px);}
.btn-danger{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.04em;padding:9px 18px;border:2px solid #B91C1C;border-radius:8px;cursor:pointer;background:#fff;color:#B91C1C;transition:all .15s;}
.btn-danger:hover{background:#FEE2E2;}
.btn-back{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.04em;padding:9px 18px;border:2px solid #E2DFD8;border-radius:8px;cursor:pointer;background:#fff;color:#3A3A55;transition:all .15s;}
.btn-back:hover{border-color:#5B21B6;color:#5B21B6;}

/* DASHBOARD */
#screen-dash{display:none;}
.dash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.dash-hdr h2{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:900;}
.pitch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pc{border-radius:16px;padding:1.1rem;cursor:pointer;border:3px solid transparent;transition:all .18s;position:relative;}
.pc:hover:not(.empty){transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.15);}
.pc.empty{background:#fff;border-color:#E2DFD8;opacity:.35;cursor:default;}
.pc-ready{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.06em;border-radius:20px;padding:2px 8px;background:rgba(0,0,0,.12);color:inherit;margin-bottom:6px;text-transform:uppercase;}
.pc-emoji{font-size:2.2rem;display:block;margin-bottom:.4rem;}
.pc-grp{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.6;margin-bottom:2px;}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:900;line-height:1.2;margin-bottom:.5rem;}
.pc-hook{font-size:.8rem;font-style:italic;line-height:1.5;opacity:.8;border-left:3px solid rgba(0,0,0,.2);padding-left:7px;}
.pc-pending{font-size:.8rem;color:#6B6B8A;}
.p1{background:#EDE9FE;border-color:#A78BFA;color:#4C1D95;}
.p2{background:#FEF9C3;border-color:#FDE047;color:#713F12;}
.p3{background:#DBEAFE;border-color:#93C5FD;color:#1E3A8A;}
.p4{background:#FCE7F3;border-color:#F472B6;color:#831843;}
.p5{background:#CCFBF1;border-color:#2DD4BF;color:#134E4A;}
.p6{background:#FFEDD5;border-color:#FB923C;color:#7C2D12;}

/* PITCH VIEW — full screen presentation mode */
#screen-pitch{display:none;min-height:calc(100vh - 50px);}
.pv-back{padding:.75rem 1.1rem;}

.pv-slide{min-height:calc(100vh - 100px);display:flex;flex-direction:column;border-radius:0;overflow:hidden;}

/* HERO — giant colored header */
.pv-hero{padding:2.5rem 2rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-shrink:0;}
.pv-hero-emoji{font-size:6rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(0,0,0,.15));}
.pv-grp-tag{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.6;margin-bottom:6px;}
.pv-biz-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.8rem,6vw,4.5rem);font-weight:900;line-height:.9;margin-bottom:8px;letter-spacing:-.01em;}
.pv-subtitle{font-size:1.1rem;opacity:.65;font-weight:600;}

/* HOOK — dark dramatic band */
.pv-hook-band{background:#1A1A2E;padding:2rem 2rem;flex-shrink:0;}
.pv-hook-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#A78BFA;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;}
.pv-hook-eyebrow::after{content:'';flex:1;height:1px;background:#A78BFA44;}
.pv-hook-text{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;color:#fff;line-height:1.25;font-style:italic;}

/* FIELDS — big readable cards in a grid */
.pv-fields{display:grid;grid-template-columns:1fr 1fr;gap:0;flex:1;background:#fff;}
.pv-f{padding:1.5rem 1.75rem;border-bottom:2px solid #F0EEE9;border-right:2px solid #F0EEE9;display:flex;flex-direction:column;gap:.5rem;}
.pv-f:nth-child(even){border-right:none;}
.pv-f.full{grid-column:span 2;border-right:none;background:#FAFAFA;}
.pv-f:last-child,.pv-f:nth-last-child(2):nth-child(odd){border-bottom:none;}
.pv-f-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:.4rem;}
.pv-f-lbl::before{content:'';width:10px;height:10px;border-radius:50%;background:currentColor;flex-shrink:0;}
.pv-f-val{font-size:clamp(1rem,2vw,1.25rem);color:#1A1A2E;line-height:1.55;font-weight:500;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Mobile<em>Pitch</em> 📱</div>
  <div class="topbar-right">
    <div class="inst-tag">Instructor</div>
    <div class="conn-pill"><div class="cdot" id="cdot"></div><span id="clabel">Connecting</span></div>
  </div>
</div>

<div class="wrap">

  <!-- WAITING -->
  <div id="screen-wait">
    <div class="page-title">Waiting for groups 👀</div>
    <div class="page-sub">Share the link — businesses lock the moment a group claims them.</div>
    <div class="url-card">
      <div class="url-icon">🔗</div>
      <div>
        <div class="url-label">Student URL</div>
        <div class="url-val">anweshade.github.io/mobilemarketing/mobilemarketing_student.html</div>
        <div class="url-hint">Students open this on their phone or laptop</div>
      </div>
    </div>
    <div class="groups-grid" id="groups-grid"></div>
    <div class="action-row">
      <button class="btn-primary" onclick="goDash()">View all pitches →</button>
      <button class="btn-danger" onclick="resetAll()">↺ Reset everything</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dash">
    <div class="dash-hdr">
      <h2>All pitches 🎤</h2>
      <button class="btn-back" onclick="goWait()">← Back</button>
    </div>
    <div class="pitch-grid" id="pitch-grid"></div>
  </div>

  <!-- PITCH VIEW -->
  <div id="screen-pitch">
    <div class="pv-back"><button class="btn-back" onclick="goDash()">← All pitches</button></div>
    <div class="pv-slide" id="pv-slide">
      <div class="pv-hero" id="pv-hero"></div>
      <div class="pv-hook-band" id="pv-hook"></div>
      <div class="pv-fields" id="pv-fields"></div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyBq8s0cZkAnE2d7OdlcUOtA-QYarhHVcqs",authDomain:"sagacity-tea.firebaseapp.com",databaseURL:"https://sagacity-tea-default-rtdb.firebaseio.com",projectId:"sagacity-tea",storageBucket:"sagacity-tea.firebasestorage.app",messagingSenderId:"558874577393",appId:"1:558874577393:web:334c4d894305b9020a5c50"};
firebase.initializeApp(FC);
const db=firebase.database();

const BIZ=[
  {id:1,e:"🧘",n:"ZenFlow Yoga",cls:"p1",sc:"pv-s1",bg:"#EDE9FE",t:"Dead app. Growing waitlist."},
  {id:2,e:"🌮",n:"Fuego Food Truck",cls:"p2",sc:"pv-s2",bg:"#FEF9C3",t:"4 stops. Zero digital presence."},
  {id:3,e:"📚",n:"Chapter One Books",cls:"p3",sc:"pv-s3",bg:"#DBEAFE",t:"Loyal fans. Aging audience."},
  {id:4,e:"💇",n:"Salon Vivid",cls:"p4",sc:"pv-s4",bg:"#FCE7F3",t:"Last-minute cancellations hurt."},
  {id:5,e:"🏋️",n:"IronYard Gym",cls:"p5",sc:"pv-s5",bg:"#CCFBF1",t:"App exists. Nobody opens it."},
  {id:6,e:"🍕",n:"Slice & Dice Pizza",cls:"p6",sc:"pv-s6",bg:"#FFEDD5",t:"Great pizza. Zero loyalty."}
];

const FDEFS=[
  {k:"target",l:"Target user",c:"#5B21B6"},
  {k:"tactic",l:"Targeting tactic",c:"#0F766E"},
  {k:"feature",l:"Killer app feature",c:"#C2410C"},
  {k:"metrics",l:"Success metrics",c:"#7E22CE"},
  {k:"message",l:"Campaign message",c:"#B45309",full:true}
];

let taken={},pitches={};

db.ref('.info/connected').on('value',s=>{
  const v=s.val();
  document.getElementById('cdot').className='cdot'+(v?' live':'');
  document.getElementById('clabel').textContent=v?'Live':'Offline';
});

db.ref('mobile_pitch').on('value',s=>{
  const v=s.val()||{};
  taken=v.taken||{};pitches=v.pitches||{};
  renderWait();renderDash();
});

function renderWait(){
  document.getElementById('groups-grid').innerHTML=BIZ.map(b=>{
    const tk=taken[b.id],sb=pitches[b.id];
    const cls=sb?'submitted':tk?'claimed':'';
    const pill=sb?'<span class="wc-pill d">✓ Submitted</span>':tk?'<span class="wc-pill g">● Working</span>':'<span class="wc-pill w">Waiting</span>';
    return`<div class="wait-card ${cls}">
      <div class="wc-top"><div class="wc-num">Group ${b.id}</div><div class="wc-emoji">${b.e}</div></div>
      <div class="wc-name">${b.n}</div>${pill}
    </div>`;
  }).join('');
}

function renderDash(){
  document.getElementById('pitch-grid').innerHTML=BIZ.map(b=>{
    const p=pitches[b.id];
    if(!p)return`<div class="pc empty"><span class="pc-emoji">${b.e}</span><div class="pc-grp">Group ${b.id}</div><div class="pc-name">${b.n}</div><div class="pc-pending">Not submitted yet</div></div>`;
    return`<div class="pc ${b.cls}" onclick="showPitch(${b.id})">
      <div class="pc-ready">🎤 Ready</div>
      <span class="pc-emoji">${b.e}</span>
      <div class="pc-grp">Group ${b.id}</div>
      <div class="pc-name">${b.n}</div>
      <div class="pc-hook">"${p.hook}"</div>
    </div>`;
  }).join('');
}

function showPitch(id){
  const p=pitches[id],b=BIZ.find(x=>x.id===id);if(!p)return;
  document.getElementById('pv-hero').style.background=b.bg;
  document.getElementById('pv-hero').innerHTML=`
    <div class="pv-hero-emoji">${b.e}</div>
    <div>
      <div class="pv-grp-tag">Group ${b.id} &nbsp;·&nbsp; MRKT 441</div>
      <div class="pv-biz-name">${b.n}</div>
      <div class="pv-subtitle">${b.t}</div>
    </div>`;
  document.getElementById('pv-hook').innerHTML=`
    <div class="pv-hook-eyebrow">Opening hook</div>
    <div class="pv-hook-text">"${p.hook}"</div>`;
  document.getElementById('pv-fields').innerHTML=FDEFS.map(f=>`
    <div class="pv-f ${f.full?'full':''}">
      <div class="pv-f-lbl" style="color:${f.c}">${f.l}</div>
      <div class="pv-f-val">${p[f.k]||'—'}</div>
    </div>`).join('');
  show('screen-pitch');
}

function show(id){['screen-wait','screen-dash','screen-pitch'].forEach(s=>document.getElementById(s).style.display=s===id?'block':'none');}
function goDash(){show('screen-dash');}
function goWait(){show('screen-wait');}
function resetAll(){if(confirm('Reset everything?'))db.ref('mobile_pitch').remove();}
</script>
</body>
</html>
