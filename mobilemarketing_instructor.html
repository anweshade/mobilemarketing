<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Marketing Pitch Builder — Projector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

  /* Waiting screen */
  #waiting-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px; }
  #waiting-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
  #waiting-screen .sub { font-size: 16px; color: #666; margin-bottom: 40px; }
  .status-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #888; margin-bottom: 32px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
  .dot.live { background: #22c55e; }
  .url-box { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 20px 28px; margin-bottom: 32px; }
  .url-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 600; margin-bottom: 6px; }
  .url-val { font-size: 22px; font-weight: 700; color: #1D9E75; letter-spacing: 0.01em; }
  .groups-waiting { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 600px; width: 100%; }
  .wait-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; padding: 14px 16px; }
  .wait-card .g-num { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .wait-card .g-name { font-size: 14px; font-weight: 600; color: #ccc; }
  .wait-card.claimed .g-name { color: #1a1a1a; }
  .wait-card.submitted .g-name { color: #1D9E75; }
  .wait-card .g-status { font-size: 12px; margin-top: 4px; color: #ccc; }
  .wait-card.claimed .g-status { color: #F59E0B; }
  .wait-card.submitted .g-status { color: #1D9E75; }
  .reset-btn { font-size: 12px; color: #e55; background: none; border: 1px solid #fcc; border-radius: 6px; padding: 6px 14px; cursor: pointer; margin-top: 8px; }
  .reset-btn:hover { background: #fff0f0; }

  /* Dashboard */
  #dashboard-screen { display: none; padding: 20px; }
  .dash-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .dash-top h1 { font-size: 20px; font-weight: 700; }
  .back-btn { font-size: 13px; color: #666; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 7px 14px; cursor: pointer; }
  .back-btn:hover { background: #f5f5f3; }
  .pitch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .pitch-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.15s; }
  .pitch-card:hover { border-color: #1D9E75; transform: translateY(-2px); }
  .pitch-card .p-group { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 4px; }
  .pitch-card .p-biz { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .pitch-card .p-hook { font-size: 13px; color: #555; font-style: italic; line-height: 1.5; border-left: 3px solid #1D9E75; padding-left: 10px; margin-top: 8px; }
  .pitch-card.empty { opacity: 0.4; cursor: default; }
  .pitch-card.empty:hover { transform: none; border-color: #e5e5e3; }
  .empty-label { font-size: 13px; color: #bbb; margin-top: 8px; }

  /* Full pitch view */
  #pitch-view { display: none; min-height: 100vh; background: #f5f5f3; padding: 28px; }
  .pitch-view-top { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .back-circle { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .pv-biz { font-size: 26px; font-weight: 800; }
  .pv-group { font-size: 13px; color: #666; margin-top: 2px; }
  .pitch-hook-big { background: #fff; border-left: 5px solid #1D9E75; border-radius: 0 12px 12px 0; padding: 16px 20px; font-size: 18px; font-style: italic; color: #1a1a1a; line-height: 1.5; margin-bottom: 20px; }
  .pitch-fields { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .pf-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 14px 16px; }
  .pf-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #1D9E75; margin-bottom: 6px; }
  .pf-val { font-size: 14px; color: #1a1a1a; line-height: 1.6; }
  .pf-card.full { grid-column: span 2; }
</style>
</head>
<body>

<div id="waiting-screen">
  <div class="status-row">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Connecting to Firebase...</span>
  </div>
  <h1>📱 Mobile Marketing Pitch Builder</h1>
  <p class="sub">MRKT 441 — Projector view</p>

  <div class="url-box">
    <div class="url-label">Students open this URL on their device</div>
    <div class="url-val" id="student-url">anweshade.github.io/mobilemarketing/mobilemarketing_student.html</div>
  </div>

  <div class="groups-waiting" id="groups-waiting"></div>

  <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="reset-btn" onclick="resetAll()" style="font-size:13px;padding:8px 18px;">&#x21BA; Reset all groups</button>
    <button onclick="goToDashboard()" style="background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;">View pitches &rarr;</button>
  </div>
</div>

<div id="dashboard-screen">
  <div class="dash-top">
    <h1>All pitches</h1>
    <button class="back-btn" onclick="backToWaiting()">&larr; Back to waiting screen</button>
  </div>
  <div class="pitch-grid" id="pitch-grid"></div>
</div>

<div id="pitch-view">
  <div class="pitch-view-top">
    <div class="back-circle" onclick="backToDashboard()">&#8592;</div>
    <div>
      <div class="pv-biz" id="pv-biz"></div>
      <div class="pv-group" id="pv-group"></div>
    </div>
  </div>
  <div class="pitch-hook-big" id="pv-hook"></div>
  <div class="pitch-fields" id="pv-fields"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBq8s0cZkAnE2d7OdlcUOtA-QYarhHVcqs",
  authDomain: "sagacity-tea.firebaseapp.com",
  databaseURL: "https://sagacity-tea-default-rtdb.firebaseio.com",
  projectId: "sagacity-tea",
  storageBucket: "sagacity-tea.firebasestorage.app",
  messagingSenderId: "558874577393",
  appId: "1:558874577393:web:334c4d894305b9020a5c50"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const businesses = [
  { id: 1, emoji: "🧘", name: "ZenFlow Yoga Studio" },
  { id: 2, emoji: "🌮", name: "Fuego Food Truck" },
  { id: 3, emoji: "📚", name: "Chapter One Bookstore" },
  { id: 4, emoji: "💇", name: "Salon Vivid" },
  { id: 5, emoji: "🏋️", name: "IronYard Gym" },
  { id: 6, emoji: "🍕", name: "Slice & Dice Pizzeria" }
];

const fieldLabels = { target: "Target user", tactic: "Targeting tactic", feature: "Key app feature", message: "Campaign message", metrics: "Success metrics", hook: "Pitch hook" };

let takenData = {};
let pitchData = {};

db.ref('.info/connected').on('value', snap => {
  const live = snap.val();
  document.getElementById('conn-dot').className = 'dot' + (live ? ' live' : '');
  document.getElementById('conn-label').textContent = live ? 'Connected to Firebase' : 'Reconnecting...';
});

db.ref('mobile_pitch').on('value', snap => {
  const val = snap.val() || {};
  takenData = val.taken || {};
  pitchData = val.pitches || {};
  renderWaiting();
  renderDashboard();
});

function renderWaiting() {
  document.getElementById('groups-waiting').innerHTML = businesses.map(b => {
    const taken = takenData[b.id];
    const submitted = pitchData[b.id];
    let cls = submitted ? 'submitted' : taken ? 'claimed' : '';
    let status = submitted ? '&#10003; Pitch submitted' : taken ? '&#9679; Working...' : 'Waiting...';
    return `<div class="wait-card ${cls}">
      <div class="g-num">Group ${b.id}</div>
      <div class="g-name">${b.emoji} ${b.name}</div>
      <div class="g-status">${status}</div>
    </div>`;
  }).join('');
}

function renderDashboard() {
  document.getElementById('pitch-grid').innerHTML = businesses.map(b => {
    const p = pitchData[b.id];
    if (!p) return `<div class="pitch-card empty">
      <div class="p-group">Group ${b.id}</div>
      <div class="p-biz">${b.emoji} ${b.name}</div>
      <div class="empty-label">Not yet submitted</div>
    </div>`;
    return `<div class="pitch-card" onclick="showPitch(${b.id})">
      <div class="p-group">Group ${b.id}</div>
      <div class="p-biz">${b.emoji} ${b.name}</div>
      <div class="p-hook">"${p.hook}"</div>
    </div>`;
  }).join('');
}

function showPitch(id) {
  const p = pitchData[id];
  const b = businesses.find(x => x.id === id);
  if (!p) return;
  document.getElementById('pv-biz').textContent = b.emoji + ' ' + b.name;
  document.getElementById('pv-group').textContent = 'Group ' + id + ' — Mobile Marketing Campaign';
  document.getElementById('pv-hook').textContent = '"' + p.hook + '"';
  const fields = ['target','tactic','feature','message','metrics'];
  document.getElementById('pv-fields').innerHTML = fields.map(k => `
    <div class="pf-card ${k === 'message' ? 'full' : ''}">
      <div class="pf-label">${fieldLabels[k]}</div>
      <div class="pf-val">${p[k] || '—'}</div>
    </div>`).join('');
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('pitch-view').style.display = 'block';
}

function goToDashboard() {
  document.getElementById('waiting-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
}

function backToWaiting() {
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('waiting-screen').style.display = 'flex';
}

function backToDashboard() {
  document.getElementById('pitch-view').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
}

function resetAll() {
  if (!confirm('Reset all groups? This clears all claims and submitted pitches.')) return;
  db.ref('mobile_pitch').remove();
}
</script>
</body>
</html>
