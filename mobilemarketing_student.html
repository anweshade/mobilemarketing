<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mobile Pitch — MRKT 441</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5B21B6;--purple-lt:#EDE9FE;--purple-bd:#A78BFA;
  --teal:#0F766E;--teal-lt:#CCFBF1;--teal-bd:#2DD4BF;
  --orange:#C2410C;--orange-lt:#FFEDD5;--orange-bd:#FB923C;
  --pink:#BE185D;--pink-lt:#FCE7F3;--pink-bd:#F472B6;
  --indigo:#3730A3;--indigo-lt:#E0E7FF;--indigo-bd:#818CF8;
  --red:#B91C1C;--red-lt:#FEE2E2;--red-bd:#F87171;
  --dark:#1A1A2E;--bg:#FFFFFF;--surface:#FFFFFF;
  --border:#E2DFD8;--muted:#6B6B8A;--light:#F5F4F0;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--dark);height:50px;display:flex;align-items:center;padding:0 1rem;gap:.75rem;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;letter-spacing:.04em;}
.topbar-logo em{color:#A78BFA;font-style:normal;}
.conn-pill{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:#aaa;background:#ffffff18;border-radius:20px;padding:3px 10px;}
.cdot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.cdot.live{background:#2DD4BF;}

/* CLAIM SCREEN */
#screen-claim{display:flex;min-height:calc(100vh - 50px);flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.claim-hero{text-align:center;margin-bottom:1.5rem;}
.claim-hero-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.4rem,10vw,4rem);font-weight:900;line-height:.9;color:var(--dark);margin-bottom:.75rem;}
.claim-hero-title em{color:#A78BFA;font-style:normal;display:block;}
.claim-hero-sub{font-size:.95rem;color:var(--muted);line-height:1.6;max-width:340px;margin:0 auto;}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px;}
.biz-btn{border-radius:14px;padding:1.1rem 1rem;cursor:pointer;text-align:left;border:3px solid transparent;transition:all .18s;position:relative;}
.biz-btn:hover:not([disabled]){transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.15);}
.biz-btn[disabled]{opacity:.35;cursor:not-allowed;filter:grayscale(.5);}
.biz-emoji{font-size:2.2rem;display:block;margin-bottom:.5rem;}
.biz-name{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;line-height:1.2;margin-bottom:.25rem;}
.biz-tagline{font-size:.78rem;opacity:.75;line-height:1.4;}
.biz-taken{position:absolute;top:8px;right:8px;font-size:.65rem;font-weight:700;background:rgba(0,0,0,.18);color:#fff;border-radius:20px;padding:2px 8px;letter-spacing:.05em;}
.b1{background:#EDE9FE;border-color:#A78BFA;} .b1 .biz-name{color:#4C1D95;}
.b2{background:#FEF9C3;border-color:#FDE047;} .b2 .biz-name{color:#713F12;}
.b3{background:#DBEAFE;border-color:#93C5FD;} .b3 .biz-name{color:#1E3A8A;}
.b4{background:#FCE7F3;border-color:#F472B6;} .b4 .biz-name{color:#831843;}
.b5{background:#CCFBF1;border-color:#2DD4BF;} .b5 .biz-name{color:#134E4A;}
.b6{background:#FFEDD5;border-color:#FB923C;} .b6 .biz-name{color:#7C2D12;}

/* BUILDER SCREEN */
#screen-builder{display:none;}
.biz-banner{border-radius:16px 16px 0 0;padding:1.25rem 1.1rem;margin:.875rem .875rem 0;display:flex;align-items:center;gap:1rem;}
.bb-emoji{font-size:3rem;flex-shrink:0;line-height:1;}
.bb-group{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.65;margin-bottom:3px;}
.bb-name{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;line-height:1.1;margin-bottom:3px;}
.bb-tagline{font-size:.8rem;opacity:.75;line-height:1.4;}
.biz-brief-box{margin:0 .875rem;border:2px solid #E2DFD8;border-top:none;border-radius:0 0 16px 16px;background:#fff;padding:1rem 1.1rem;font-size:.85rem;line-height:1.75;color:#3A3A55;}
.biz-brief-box b{color:#1A1A2E;font-weight:700;}

.prog-wrap{padding:.75rem .875rem .375rem;}
.prog-track{height:6px;background:#E2DFD8;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:0%;border-radius:99px;transition:width .3s;}
.prog-label{font-size:.72rem;font-weight:600;margin-top:4px;text-align:right;}

.steps-wrap{padding:.5rem .875rem;}
.step-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;margin-bottom:.625rem;overflow:hidden;transition:border-color .15s;}
.step-card:focus-within{border-color:#A78BFA;}
.step-head{padding:.7rem .9rem .4rem;display:flex;align-items:center;gap:.6rem;}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:900;flex-shrink:0;}
.step-lbl{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.02em;}
.step-hint{font-size:.78rem;color:var(--muted);line-height:1.55;padding:0 .9rem .6rem;}
.step-card textarea{width:100%;min-height:68px;padding:.7rem .9rem;font-size:.85rem;border:none;border-top:2px solid var(--light);background:#FAFAF8;color:var(--dark);resize:none;font-family:'Barlow',sans-serif;line-height:1.55;}
.step-card textarea:focus{outline:none;background:#fff;}
.step-card textarea::placeholder{color:#C0BDBA;}

.submit-wrap{padding:.75rem .875rem 2rem;}
.submit-btn{width:100%;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:.04em;background:var(--dark);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .15s;}
.submit-btn:hover:not(:disabled){background:#2d2d4e;transform:translateY(-1px);}
.submit-btn:disabled{background:#B0AECA;cursor:not-allowed;}
.err-msg{font-size:.8rem;font-weight:700;color:var(--red);background:var(--red-lt);border:1.5px solid var(--red-bd);border-radius:8px;padding:.6rem .9rem;margin-top:.625rem;text-align:center;display:none;}
.spinner{display:inline-block;width:14px;height:14px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUBMITTED */
#screen-done{display:none;text-align:center;padding:3rem 1.5rem;}
.done-emoji{font-size:4.5rem;display:block;animation:pop .45s cubic-bezier(.34,1.56,.64,1);margin-bottom:1rem;}
@keyframes pop{0%{transform:scale(.3) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
.done-title{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:900;color:var(--dark);margin-bottom:.5rem;line-height:1;}
.done-sub{font-size:.95rem;color:var(--muted);line-height:1.7;margin-bottom:1.25rem;}
.done-pill{display:inline-flex;align-items:center;gap:.5rem;background:var(--dark);color:#fff;border-radius:99px;padding:.6rem 1.25rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Mobile<em>Pitch</em> 📱</div>
  <div class="conn-pill"><div class="cdot" id="cdot"></div><span id="clabel">Connecting</span></div>
</div>

<!-- CLAIM -->
<div id="screen-claim">
  <div class="claim-hero">
    <div class="claim-hero-title">You're a<em>mobile agency.</em></div>
    <div class="claim-hero-sub">Claim your client below. Once it's taken, it's gone. Build your pitch, then sell it to the class. 🎯</div>
  </div>
  <div class="biz-grid" id="biz-grid"></div>
</div>

<!-- BUILDER -->
<div id="screen-builder">
  <div class="biz-banner" id="biz-banner"></div>
  <div class="biz-brief-box" id="biz-brief-box"></div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-label" id="prog-label" style="color:var(--muted)">0 of 6 complete</div>
  </div>
  <div class="steps-wrap" id="steps-wrap"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="doSubmit()">SEND TO PROJECTOR →</button>
    <div class="err-msg" id="err-msg">Fill in all 6 steps first!</div>
  </div>
</div>

<!-- DONE -->
<div id="screen-done">
  <span class="done-emoji">🚀</span>
  <div class="done-title">You're live!</div>
  <div class="done-sub">Your pitch is on the projector.<br>Time to present — make it count.</div>
  <div class="done-pill" id="done-pill"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyBq8s0cZkAnE2d7OdlcUOtA-QYarhHVcqs",authDomain:"sagacity-tea.firebaseapp.com",databaseURL:"https://sagacity-tea-default-rtdb.firebaseio.com",projectId:"sagacity-tea",storageBucket:"sagacity-tea.firebasestorage.app",messagingSenderId:"558874577393",appId:"1:558874577393:web:334c4d894305b9020a5c50"};
firebase.initializeApp(FC);
const db=firebase.database();

const BIZ=[
  {id:1,e:"🧘",n:"ZenFlow Yoga",t:"Dead app. Growing waitlist.",b:`<b>The business:</b> ZenFlow is a boutique yoga studio with two locations in a mid-sized city. They offer 30+ weekly classes across hot yoga, vinyasa, and meditation, and have built a genuinely passionate community of around 800 active members. Demand is so high that popular morning classes have a waitlist of 40+ people.<br><br><b>The problem:</b> A 22% no-show rate is quietly destroying their revenue. Members book a spot and simply don't show up — leaving empty mats and turning away waitlisted customers who would have paid. That's roughly $3,400/month in lost revenue at their average class price of $19. They also struggle to communicate schedule changes and last-minute openings — currently done by email, which gets a 14% open rate.<br><br><b>The app situation:</b> They launched a basic booking app 6 months ago. Only 8% of members have downloaded it, and those who have open it less than once a month. The app can send push notifications but nobody has set up a strategy for them.<br><br><b>What they want:</b> A mobile strategy that drives app downloads, slashes the no-show rate, fills waitlisted spots instantly when someone cancels, and keeps members engaged between classes. Budget: $800/month.`,cls:"b1",prog:"#7C3AED"},

  {id:2,e:"🌮",n:"Fuego Food Truck",t:"4 stops. Zero digital presence.",b:`<b>The business:</b> Fuego is widely considered the best food truck in the city — a rotating menu of creative street tacos, agua frescas, and loaded fries with a cult following built entirely by word of mouth. On a good day, they sell out in 2 hours. The owner, Marco, has been running the truck for 4 years and recently added a second truck and two new staff.<br><br><b>The problem:</b> Fuego rotates between 4 different city locations on a weekly schedule, but the schedule changes based on events, weather, and permits. Customers have no reliable way to know where the truck is on any given day. Some regulars have figured out the rough pattern — but new customers who heard about Fuego on social media show up to the wrong spot constantly. Marco estimates he loses 30–40 potential customers per day to this confusion alone.<br><br><b>The digital situation:</b> Fuego has no app, no SMS list, and no loyalty program. Their only digital presence is an Instagram account with 4,200 followers that gets updated maybe twice a week — sometimes after the lunch rush has already started. Marco has tried posting location updates but followers don't see them in time.<br><br><b>What they want:</b> A mobile strategy that tells hungry customers exactly where Fuego is right now, builds a reliable audience they can reach instantly, and drives consistent lunchtime foot traffic to whichever location they're at. No big budget — scrappy and effective.`,cls:"b2",prog:"#D97706"},

  {id:3,e:"📚",n:"Chapter One Books",t:"Loyal fans. Aging audience.",b:`<b>The business:</b> Chapter One is an independent bookstore that has operated in the same neighborhood for 22 years. They've survived Borders closing, the Kindle era, and Amazon — through sheer community loyalty, hand-selling by knowledgeable staff, and a packed events calendar. They host 3–4 events per month: author signings, book clubs, themed reading nights, and student discounts during back-to-school.<br><br><b>The problem:</b> Their customer base is aging. Average customer age is 47, and foot traffic from under-35s is nearly zero — despite being two blocks from a university with 12,000 students. Their events regularly underperform: a recent author signing with a genuinely popular local writer drew only 23 people to a room that holds 80. The books they're hand-selling to loyal 50-year-olds aren't the same books that would bring in a new generation.<br><br><b>The digital situation:</b> Chapter One has a solid email newsletter (1,800 subscribers, 38% open rate) that reaches their existing audience perfectly — but that audience is already loyal. They have almost no mobile presence. No app, no SMS list, and their website is not mobile-optimized. Younger shoppers who discover them on Google or a friend's recommendation visit once and never return.<br><br><b>What they want:</b> A mobile strategy that gets 18–30 year olds through the door and keeps them coming back — especially for events. They want to feel culturally relevant to a generation that shops on their phones, not via email newsletters.`,cls:"b3",prog:"#1D4ED8"},

  {id:4,e:"💇",n:"Salon Vivid",t:"Last-minute cancellations hurt.",b:`<b>The business:</b> Salon Vivid is a well-regarded hair and beauty salon with 3 full-time stylists. Each stylist is booked 2–3 weeks out — which sounds great until you realize what cancellations do to that revenue. Services range from $65 blowouts to $220 color treatments, and each stylist can serve 5–6 clients per day.<br><br><b>The problem:</b> Last-minute cancellations and no-shows are costing the salon roughly $1,200–$1,500/month in empty chair time. Most cancellations come in less than 3 hours before the appointment — not enough time to fill the slot through their current system (calling down a paper waitlist). The deeper issue is that clients don't have a habit of rebooking — they come in, love the result, and then wait until their hair desperately needs attention before thinking about booking again. By then, a 3-week wait feels too long and they go somewhere else.<br><br><b>The digital situation:</b> Vivid uses a third-party booking website that clients visit to make their first appointment and never return to. There's no app, no push notifications, no SMS reminders. Appointment confirmation is sent by email and is frequently missed. The owner, Priya, knows her clients are on their phones constantly — she just has no way to reach them there.<br><br><b>What they want:</b> A mobile strategy that sends smart appointment reminders, fills cancelled slots within minutes by alerting a waitlist, and nudges clients to rebook before the habit breaks. They also want to build a loyalty system that rewards clients who refer friends.`,cls:"b4",prog:"#BE185D"},

  {id:5,e:"🏋️",n:"IronYard Gym",t:"App exists. Nobody opens it.",b:`<b>The business:</b> IronYard is an independently owned 24-hour gym with 1,400 active members. They compete directly against a Planet Fitness and an LA Fitness that opened nearby in the past two years — both offering lower monthly rates. IronYard's edge is personal: smaller classes, coaches who know members by name, a genuine community vibe, and a well-equipped free weights section that serious lifters prefer.<br><br><b>The problem:</b> Membership cancellations have risen 18% over the past two quarters — primarily among members who joined in the last year and never built a consistent workout habit. Exit survey data shows the most common reason for cancelling is "I wasn't using it enough to justify the cost." These members didn't quit because IronYard is bad — they quit because nobody nudged them to come back after they missed a week.<br><br><b>The app situation:</b> IronYard launched a check-in app 14 months ago. 1,200 members downloaded it. The average session length is 28 seconds (basically open → check in → close). 58% of members haven't opened it in over 6 weeks. The app can technically send push notifications, run a class booking system, and display workout plans — but none of these features have been set up or promoted.<br><br><b>What they want:</b> A mobile strategy that re-engages lapsed members before they cancel, makes the app worth opening on rest days too, and tells the IronYard community story in a way that justifies their slightly higher price vs. the big chains.`,cls:"b5",prog:"#0F766E"},

  {id:6,e:"🍕",n:"Slice & Dice Pizza",t:"Great pizza. Zero loyalty.",b:`<b>The business:</b> Slice & Dice is a family-owned pizzeria that has been a neighborhood staple for 11 years — hand-tossed dough, house-made sauce, the kind of place locals swear by. Three months ago they finally launched online ordering through a branded app, and it's generating real revenue: about 200 orders per month with an average order value of $34.<br><br><b>The problem:</b> Their repeat order rate is only 12% — meaning 88% of people who order once never order again. The industry benchmark for loyal pizza customers is 35%+ repeat rate. The owner, Elena, has spoken to some first-time customers and the feedback is consistent: they loved the pizza, they just… forgot about it. A week goes by, they're hungry on a Friday night, and they open DoorDash out of habit instead of thinking of Slice & Dice. Elena is losing regulars not to bad pizza but to being out of sight, out of mind.<br><br><b>The digital situation:</b> The app exists and works well for ordering. But after a customer orders once, there's no follow-up — no thank you message, no loyalty reward, no nudge the following Friday. They have 600 app downloads and no push notification strategy. They also have no SMS list. Elena's budget is tight but she's willing to invest $400/month if it demonstrably builds repeat business.<br><br><b>What they want:</b> A mobile strategy that converts first-time orderers into weekly regulars — the people who think "Slice & Dice" the moment Friday night hunger hits, without needing to be reminded by a DoorDash ad.`,cls:"b6",prog:"#C2410C"}
];

const STEPS=[
  {k:"target",l:"Who are you targeting?",c:"#7C3AED",bg:"#EDE9FE",hint:"Be specific — don't just say 'customers.' Who is the ideal mobile user for this business? Think about their age, daily routines, and when they're most likely to be on their phone. Are they 'snacking' (quick check-ins, impulse decisions) or 'feasting' (longer sessions, research mode)? How does their location matter for this business?"},
  {k:"tactic",l:"How will you reach them?",c:"#0F766E",bg:"#CCFBF1",hint:"Choose ONE primary targeting tactic from today's lecture and explain exactly why it's the right fit for this specific business. Options include: geo-fencing (targeting by radius from a location), geo-texting (SMS by location), targeted push notifications (behavioral segments), in-app advertising, zip-code targeting, or SMS campaigns. Don't just name it — justify it with the business's situation."},
  {k:"feature",l:"One killer app feature",c:"#C2410C",bg:"#FFEDD5",hint:"If this business had a great mobile app, what ONE feature would make members actually open it every week? Think beyond the obvious — consider features like: real-time location tracking, loyalty point systems, mobile chat with staff, easy one-tap rebooking, personalized push notifications based on behavior, device sync, social integration, or in-app exclusive offers. Explain why this specific feature solves this business's core problem."},
  {k:"message",l:"Write your actual campaign message",c:"#B45309",bg:"#FEF9C3",hint:"Write the exact text of a real push notification or SMS this business would send. This isn't a description — actually write it, word for word, as it would appear on a customer's phone. Remember: mobile users are 'snacking' — you have 2 seconds. Include a specific offer or value, urgency, and a clear next step. Example: 'Your favorite stylist has a slot open at 3pm today. Grab it before it's gone → [book now]'"},
  {k:"metrics",l:"How will you measure success?",c:"#7E22CE",bg:"#F5F3FF",hint:"Pick exactly TWO metrics from today's lecture that are most relevant for this business's specific goal. For each metric, explain: (1) what it measures, (2) how you'd calculate it, and (3) what a 'good' benchmark looks like for this business. Options include: install rate, app stickiness (DAU/MAU × 100), uninstall rate, churn rate, push notification open rate, conversion rate, retention rate, average session length, or in-app purchase rate."},
  {k:"hook",l:"🔥 Your 10-second pitch hook",c:"#B91C1C",bg:"#FEE2E2",hint:"Write the single most compelling sentence your group will open the pitch with — the line that makes the class sit up and listen. It should capture the business's core problem and hint at your solution in a way that feels urgent and real. Make it specific to this business, not generic. Example: 'Right now, a ZenFlow member just no-showed their 6am class — that empty mat costs $18, and it happens 40 times a week. We're going to fix that.'"}
];

let myId=null,taken={};

db.ref('.info/connected').on('value',s=>{
  const v=s.val();
  document.getElementById('cdot').className='cdot'+(v?' live':'');
  document.getElementById('clabel').textContent=v?'Live':'Offline';
});
db.ref('mobile_pitch/taken').on('value',s=>{taken=s.val()||{};if(!myId)renderGrid();});

function renderGrid(){
  document.getElementById('biz-grid').innerHTML=BIZ.map(b=>{
    const tk=taken[b.id];
    return`<button class="biz-btn ${b.cls}" onclick="claim(${b.id})" ${tk?'disabled':''}>
      ${tk?'<span class="biz-taken">TAKEN</span>':''}
      <span class="biz-emoji">${b.e}</span>
      <div class="biz-name">${b.n}</div>
      <div class="biz-tagline">${b.t}</div>
    </button>`;
  }).join('');
}

function claim(id){
  if(taken[id])return;
  db.ref('mobile_pitch/taken/'+id).transaction(c=>c?undefined:true,(e,ok)=>{
    if(ok){myId=id;document.getElementById('screen-claim').style.display='none';buildScreen(id);}
    else renderGrid();
  });
}

function buildScreen(id){
  const b=BIZ.find(x=>x.id===id);
  document.getElementById('screen-builder').style.display='block';
  const bn=document.getElementById('biz-banner');
  bn.className='biz-banner '+b.cls;
  bn.innerHTML=`<div class="bb-emoji">${b.e}</div><div>
    <div class="bb-group">Group ${b.id} — Your client</div>
    <div class="bb-name">${b.n}</div>
    <div class="bb-tagline">${b.t}</div>
  </div>`;
  document.getElementById('biz-brief-box').innerHTML=b.b;
  document.getElementById('prog-fill').style.background=b.prog;
  document.getElementById('prog-label').style.color=b.prog;
  document.getElementById('steps-wrap').innerHTML=STEPS.map((s,i)=>`
    <div class="step-card">
      <div class="step-head">
        <div class="step-num" style="background:${s.bg};color:${s.c}">${i+1}</div>
        <div class="step-lbl" style="color:${s.c}">${s.l}</div>
      </div>
      <div class="step-hint">${s.hint}</div>
      <textarea id="f-${s.k}" placeholder="Type here..." oninput="updateProg()"></textarea>
    </div>`).join('');
}

function updateProg(){
  const n=STEPS.filter(s=>{const e=document.getElementById('f-'+s.k);return e&&e.value.trim();}).length;
  document.getElementById('prog-fill').style.width=Math.round(n/STEPS.length*100)+'%';
  document.getElementById('prog-label').textContent=n+' of '+STEPS.length+' complete';
}

function doSubmit(){
  const ans={};let ok=true;
  STEPS.forEach(s=>{const v=document.getElementById('f-'+s.k).value.trim();if(!v)ok=false;ans[s.k]=v;});
  if(!ok){document.getElementById('err-msg').style.display='block';return;}
  document.getElementById('err-msg').style.display='none';
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>SENDING...';
  const b=BIZ.find(x=>x.id===myId);
  db.ref('mobile_pitch/pitches/'+myId).set({groupId:myId,bizName:b.n,emoji:b.e,cls:b.cls,prog:b.prog,...ans,ts:Date.now()},err=>{
    if(!err){
      document.getElementById('screen-builder').style.display='none';
      document.getElementById('screen-done').style.display='block';
      document.getElementById('done-pill').textContent=b.e+' '+b.n;
    }else{btn.disabled=false;btn.innerHTML='SEND TO PROJECTOR →';alert('Error — try again.');}
  });
}
</script>
</body>
</html>
